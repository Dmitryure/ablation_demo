[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests", "."]
extend-exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    ".mypy_cache",
    ".ruff_cache",
    "build",
    "dist",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "W",
    "I",
    "B",
    "C4",
    "PIE",
    "SIM",
    "UP",
    "RUF",
]
ignore = [
    "E501",
]
fixable = ["ALL"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.autoflake]
in-place = true
recursive = true
remove-all-unused-imports = true
remove-unused-variables = true
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    ".mypy_cache",
    ".ruff_cache",
    "build",
    "dist",
]

[tool.pylint.main]
py-version = "3.12"
ignore = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    ".mypy_cache",
    ".ruff_cache",
    "build",
    "dist",
]
ignore-paths = [
    "^\\.git/.*$",
    "^\\.venv/.*$",
    "^venv/.*$",
    "^__pycache__/.*$",
    "^\\.mypy_cache/.*$",
    "^\\.ruff_cache/.*$",
    "^build/.*$",
    "^dist/.*$",
]

[tool.pylint.format]
max-line-length = 100

[tool.pylint.reports]
reports = false
score = false

[tool.pylint."messages control"]
disable = [
    "line-too-long",
    "missing-class-docstring",
    "missing-function-docstring",
    "missing-module-docstring",
]
