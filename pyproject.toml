[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests", "."]
extend-exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    ".mypy_cache",
    ".ruff_cache",
    "build",
    "dist",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "W",
    "I",
    "B",
    "C4",
    "PIE",
    "SIM",
    "UP",
    "RUF",
]
ignore = [
    "E501",
]
fixable = ["ALL"]

[tool.ruff.lint.per-file-ignores]
"scripts/*.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.autoflake]
in-place = true
recursive = true
remove-all-unused-imports = true
remove-unused-variables = true
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    ".mypy_cache",
    ".ruff_cache",
    "build",
    "dist",
]

[tool.pylint.main]
py-version = "3.12"
ignore = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    ".mypy_cache",
    ".ruff_cache",
    "build",
    "dist",
]
ignore-paths = [
    "^\\.git/.*$",
    "^\\.venv/.*$",
    "^venv/.*$",
    "^__pycache__/.*$",
    "^\\.mypy_cache/.*$",
    "^\\.ruff_cache/.*$",
    "^build/.*$",
    "^dist/.*$",
]

[tool.pylint.format]
max-line-length = 100

[tool.pylint.reports]
reports = false
score = false

[tool.pylint."messages control"]
disable = [
    "abstract-method",
    "broad-exception-caught",
    "consider-using-from-import",
    "duplicate-code",
    "fixme",
    "import-outside-toplevel",
    "invalid-name",
    "line-too-long",
    "missing-class-docstring",
    "missing-function-docstring",
    "missing-module-docstring",
    "no-member",
    "not-callable",
    "redefined-builtin",
    "redefined-outer-name",
    "too-few-public-methods",
    "too-many-arguments",
    "too-many-boolean-expressions",
    "too-many-instance-attributes",
    "too-many-lines",
    "too-many-locals",
    "too-many-positional-arguments",
    "too-many-public-methods",
    "too-many-return-statements",
    "too-many-statements",
    "wrong-import-position",
]
